<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; color: inherit; }
html, body {
  width: 100%; height: 100%;
  background: #04020e;
  color: #f0ebff;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
}
#pixi-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  border-radius: 48px;
}
#root {
  position: relative;
  z-index: 2;
  width: 393px; height: 852px;
  overflow: hidden;
  background: #04020e;
  border-radius: 48px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
}

/* ── ANIMATIONS ─────────────────────────────── */
@keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
@keyframes fadeOut { from { opacity:1 } to { opacity:0 } }
@keyframes slideUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes cardReveal {
  0%   { opacity:0; transform:translateY(30px) scale(0.92); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes shimmerLoop {
  0%   { background-position: -300% center; }
  100% { background-position: 300% center; }
}
@keyframes statReveal {
  from { opacity:0; transform:translateX(-8px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes tap-hint {
  0%,100% { opacity:0.5; transform:scale(1); }
  50%     { opacity:1;   transform:scale(1.06); }
}
@keyframes runeRotate {
  from { transform:rotate(0deg); }
  to   { transform:rotate(360deg); }
}
@keyframes float-gentle {
  0%,100% { transform:translateY(0px); }
  50%     { transform:translateY(-10px); }
}
@keyframes rank-pop {
  0%  { transform:scale(0) rotate(-15deg); opacity:0; }
  65% { transform:scale(1.18) rotate(3deg); opacity:1; }
  100%{ transform:scale(1) rotate(0deg); opacity:1; }
}
@keyframes victoryPulse {
  0%,100% { text-shadow: 0 0 20px #fbbf24, 0 0 60px #f59e0b80; }
  50%     { text-shadow: 0 0 40px #fbbf24, 0 0 120px #f59e0b; }
}
@keyframes expFill {
  from { width: 0%; }
  to   { width: var(--exp-w); }
}
@keyframes countUp {
  from { opacity:0; transform:scale(0.8); }
  to   { opacity:1; transform:scale(1); }
}
@keyframes wipeDown {
  0%   { transform:translateY(-100%); }
  100% { transform:translateY(0%); }
}
@keyframes wipeUp {
  0%   { transform:translateY(0%); }
  100% { transform:translateY(-100%); }
}
@keyframes slash {
  0%   { opacity:0; transform:scaleX(0) rotate(-8deg); transform-origin:left center; }
  30%  { opacity:1; transform:scaleX(1) rotate(-8deg); }
  70%  { opacity:1; transform:scaleX(1) rotate(-8deg); }
  100% { opacity:0; transform:scaleX(1.1) rotate(-8deg); }
}
@keyframes enemyShake {
  0%,100% { transform:translateX(0) scale(1); }
  15%     { transform:translateX(-12px) scale(0.97); }
  35%     { transform:translateX(10px)  scale(1.02); }
  55%     { transform:translateX(-6px)  scale(0.98); }
  75%     { transform:translateX(4px)   scale(1.01); }
}
@keyframes enemyFall {
  0%   { opacity:1; transform:translateY(0) rotate(0deg) scale(1); }
  100% { opacity:0; transform:translateY(120px) rotate(28deg) scale(0.6); }
}
@keyframes victoryFlash {
  0%,100% { opacity:0; }
  10%,90% { opacity:1; }
}
@keyframes rewardRow {
  from { opacity:0; transform:translateX(-12px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes glowPulse {
  0%,100% { opacity:0.4; }
  50%     { opacity:1; }
}
@keyframes borderMarch {
  from { stroke-dashoffset: 0; }
  to   { stroke-dashoffset: -40; }
}

<body>
<div id="root"></div>

<!-- ═══════════════════════════════════════════════════════════
     PIXI VFX ENGINE  (同一コードベース・Loot Drop VFXより)
═══════════════════════════════════════════════════════════ -->
<script>
const PIXI_APP = {
  app:null, width:0, height:0,
  orbContainer:null, shardContainer:null,
  flareContainer:null, fireflyContainer:null,
  bgLayer:null, orbTicker:null, ambientTicker:null,
};
function hexToPixi(h){ return parseInt(h.replace('#',''),16); }
function lerp(a,b,t){ return a+(b-a)*t; }
function easeOutCubic(t){ return 1-Math.pow(1-t,3); }
function easeOutBack(t){ const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }

function initPixi(rarity){
  let canvas = document.getElementById('pixi-canvas');
  if(!canvas){
    canvas = document.createElement('canvas');
    canvas.id = 'pixi-canvas';
    document.getElementById('root').prepend(canvas);
  }
  const W=393, H=852;
  PIXI_APP.width=W; PIXI_APP.height=H;
  if(PIXI_APP.app){ PIXI_APP.app.destroy(false); }

  const app = new PIXI.Application({
    view:canvas, width:W, height:H,
    backgroundAlpha:0, antialias:true,
    resolution:window.devicePixelRatio||1, autoDensity:true,
  });
  PIXI_APP.app=app;

  const bgLayer      = new PIXI.Container();
  const fireflyLayer = new PIXI.Container();
  const orbLayer     = new PIXI.Container();
  const flareLayer   = new PIXI.Container();
  const shardLayer   = new PIXI.Container();
  app.stage.addChild(bgLayer,fireflyLayer,orbLayer,flareLayer,shardLayer);
  PIXI_APP.orbContainer=orbLayer;
  PIXI_APP.shardContainer=shardLayer;
  PIXI_APP.flareContainer=flareLayer;
  PIXI_APP.fireflyContainer=fireflyLayer;
  PIXI_APP.bgLayer=bgLayer;

  const bgGfx = new PIXI.Graphics();
  const col = rarity==='unique' ? 0xfbbf24 : 0x8A2BE2;
  for(let i=0;i<12;i++){
    const t=i/11;
    bgGfx.beginFill(col, 0.22*(1-t));
    bgGfx.drawCircle(W/2,H/2,lerp(0,Math.max(W,H)*0.9,t));
    bgGfx.endFill();
  }
  bgLayer.addChild(bgGfx);
  return app;
}

function spawnOrb(rarity, onLand){
  const app=PIXI_APP.app;
  const W=PIXI_APP.width, H=PIXI_APP.height;
  const isUnique=rarity==='unique';
  const mainColor=isUnique?0xfbbf24:0x8A2BE2;
  const glowColor=isUnique?0xf59e0b:0xc084fc;
  const cx=W/2, startY=-80, landY=H*0.38;

  const container=new PIXI.Container();
  container.x=cx; container.y=startY;
  PIXI_APP.orbContainer.addChild(container);

  const glow=new PIXI.Graphics();
  glow.beginFill(mainColor,0.12); glow.drawCircle(0,0,isUnique?72:64); glow.endFill();
  glow.beginFill(mainColor,0.22); glow.drawCircle(0,0,isUnique?52:46); glow.endFill();
  container.addChild(glow);

  const runeRing=new PIXI.Graphics();
  runeRing.lineStyle(1.5,glowColor,0.7);
  runeRing.drawCircle(0,0,isUnique?48:42);
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2, r=isUnique?48:42;
    runeRing.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    runeRing.lineTo(Math.cos(a)*(r+8),Math.sin(a)*(r+8));
  }
  container.addChild(runeRing);

  const core=new PIXI.Graphics();
  const layers=isUnique
    ?[[0xfffde7,0.9,8],[0xfde68a,0.8,14],[0xfbbf24,0.7,22],[0xf59e0b,0.6,30],[0xb45309,0.3,38]]
    :[[0xf3e8ff,0.9,8],[0xe9d5ff,0.8,14],[0xc084fc,0.7,22],[0x8A2BE2,0.6,30],[0x4a0e8a,0.3,38]];
  layers.reverse().forEach(([c,a,r])=>{ core.beginFill(c,a); core.drawCircle(0,0,r); core.endFill(); });
  container.addChild(core);

  const spot=new PIXI.Graphics();
  spot.beginFill(0xffffff,0.6); spot.drawCircle(-8,-8,7); spot.endFill();
  container.addChild(spot);

  const trail=[];
  const dispSprite=new PIXI.Sprite(PIXI.Texture.EMPTY);
  dispSprite.width=200; dispSprite.height=200; dispSprite.anchor.set(0.5);
  const dispFilter=new PIXI.DisplacementFilter(dispSprite);
  dispFilter.scale.x=0; dispFilter.scale.y=0;
  container.filters=[dispFilter]; container.addChild(dispSprite);

  let t=0, phase='fall', pulseT=0, landed=false;
  const ticker=(delta)=>{
    if(phase==='fall'){
      t+=delta*0.016;
      const p=Math.min(t,1), ep=easeOutCubic(p);
      container.y=lerp(startY,landY,ep);
      if(Math.random()<0.35){
        const tr=new PIXI.Graphics();
        tr.beginFill(mainColor,0.5); tr.drawCircle(0,0,4+Math.random()*8); tr.endFill();
        tr.x=cx+(Math.random()-0.5)*8; tr.y=container.y+20+Math.random()*20;
        PIXI_APP.orbContainer.addChild(tr); trail.push({g:tr,life:1});
      }
      trail.forEach((tr,i)=>{
        tr.life-=delta*0.06; tr.g.alpha=tr.life; tr.g.scale.set(tr.life);
        if(tr.life<=0){ PIXI_APP.orbContainer.removeChild(tr.g); trail.splice(i,1); }
      });
      if(p>0.8){ app.stage.x=(Math.random()-0.5)*4*(1-p)*10; app.stage.y=(Math.random()-0.5)*4*(1-p)*10; }
      if(p>=1){
        phase='pulse'; app.stage.x=0; app.stage.y=0;
        spawnShockwave(cx,landY,mainColor);
        if(!landed){ landed=true; onLand&&onLand(); }
      }
    } else if(phase==='pulse'){
      pulseT+=delta*0.04;
      const s=1+Math.sin(pulseT*Math.PI*2)*0.06;
      container.scale.set(s);
      runeRing.rotation+=delta*0.018;
      dispFilter.scale.x=Math.sin(pulseT*Math.PI*2)*18;
      dispFilter.scale.y=Math.sin(pulseT*Math.PI*2+0.5)*18;
      glow.alpha=0.7+Math.sin(pulseT*Math.PI*2)*0.3;
      if(Math.random()<0.15) spawnSparkle(cx+container.scale.x*(Math.random()-0.5)*60, landY+(Math.random()-0.5)*60, mainColor, glowColor);
    }
  };
  app.ticker.add(ticker);
  PIXI_APP.orbTicker=ticker;
  return { container, setPhase:(p)=>{ phase=p; } };
}

function spawnShockwave(x,y,color){
  const app=PIXI_APP.app;
  const ring=new PIXI.Graphics();
  ring.lineStyle(3,color,0.9); ring.drawCircle(0,0,1);
  ring.x=x; ring.y=y;
  PIXI_APP.flareContainer.addChild(ring);
  let t=0;
  const tick=(delta)=>{
    t+=delta*0.04; ring.scale.set(1+t*80); ring.alpha=Math.max(0,1-t*1.4);
    if(t>0.8){ app.ticker.remove(tick); PIXI_APP.flareContainer.removeChild(ring); }
  };
  app.ticker.add(tick);
}

function spawnSparkle(x,y,c1,c2){
  const app=PIXI_APP.app;
  const g=new PIXI.Graphics();
  const c=Math.random()<0.5?c1:c2;
  g.beginFill(c,1); g.drawCircle(0,0,1.5+Math.random()*2.5); g.endFill();
  g.x=x; g.y=y;
  const vx=(Math.random()-0.5)*2, vy=-1.5-Math.random()*2;
  PIXI_APP.flareContainer.addChild(g);
  let t=0;
  const tick=(delta)=>{
    t+=delta*0.05; g.x+=vx*delta*0.8; g.y+=vy*delta*0.8; g.alpha=Math.max(0,1-t);
    if(t>=1){ app.ticker.remove(tick); PIXI_APP.flareContainer.removeChild(g); }
  };
  app.ticker.add(tick);
}

function triggerShatter(rarity,cx,cy,onDone){
  const app=PIXI_APP.app;
  const isUnique=rarity==='unique';
  const mainColor=isUnique?0xfbbf24:0x8A2BE2;
  const glowColor=isUnique?0xf59e0b:0xc084fc;
  const W=393,H=852;

  if(PIXI_APP.orbTicker) app.ticker.remove(PIXI_APP.orbTicker);
  PIXI_APP.orbContainer.removeChildren();

  const bloom=new PIXI.Graphics();
  bloom.beginFill(0xffffff,1); bloom.drawRect(0,0,W,H); bloom.endFill();
  bloom.alpha=0; app.stage.addChild(bloom);

  const shards=[];
  for(let i=0;i<28;i++){
    const g=new PIXI.Graphics();
    const angle=(i/28)*Math.PI*2+Math.random()*0.4;
    const size=6+Math.random()*18;
    const c=i%3===0?0xffffff:i%3===1?glowColor:mainColor;
    g.beginFill(c,0.9);
    const pts=[];
    for(let j=0;j<4;j++){
      const a=(j/4)*Math.PI*2+Math.random();
      pts.push(Math.cos(a)*size*(0.4+Math.random()*0.6));
      pts.push(Math.sin(a)*size*(0.4+Math.random()*0.6));
    }
    g.drawPolygon(pts); g.endFill();
    g.x=cx; g.y=cy;
    const speed=4+Math.random()*14;
    const vx=Math.cos(angle)*speed, vy=Math.sin(angle)*speed-4;
    const rot=(Math.random()-0.5)*0.3;
    PIXI_APP.shardContainer.addChild(g);
    shards.push({g,vx,vy,rot,life:1});
  }

  const flareGfx=new PIXI.Graphics();
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2;
    const len=(i%2===0?220:100)*(0.6+Math.random()*0.4);
    flareGfx.lineStyle(i%2===0?2.5:1, i%2===0?glowColor:mainColor, 0.8*(i%2===0?1:0.6));
    flareGfx.moveTo(cx,cy); flareGfx.lineTo(cx+Math.cos(a)*len, cy+Math.sin(a)*len);
  }
  flareGfx.beginFill(0xffffff,0.95); flareGfx.drawCircle(cx,cy,22); flareGfx.endFill();
  flareGfx.beginFill(glowColor,0.7);  flareGfx.drawCircle(cx,cy,14); flareGfx.endFill();
  flareGfx.beginFill(0xffffff,0.9);   flareGfx.drawCircle(cx,cy,7);  flareGfx.endFill();
  PIXI_APP.flareContainer.addChild(flareGfx);

  const bloomRings=[];
  for(let i=0;i<4;i++){
    const r=new PIXI.Graphics();
    r.lineStyle(3-i*0.5, i%2===0?glowColor:mainColor, 0.9);
    r.drawCircle(cx,cy,10); PIXI_APP.flareContainer.addChild(r);
    bloomRings.push({g:r,t:-i*0.04});
  }
  spawnFireflies(rarity);

  let t=0;
  const tick=(delta)=>{
    t+=delta*0.035;
    if(t<0.15) bloom.alpha=t/0.15; else bloom.alpha=Math.max(0,1-(t-0.15)/0.25);
    shards.forEach(s=>{
      s.life-=delta*0.022;
      s.g.x+=s.vx*delta*0.7; s.g.y+=s.vy*delta*0.7; s.vy+=delta*0.35;
      s.g.rotation+=s.rot*delta; s.g.alpha=Math.max(0,s.life); s.g.scale.set(Math.max(0,s.life));
    });
    flareGfx.alpha=Math.max(0,1-(t-0.12)/0.6);
    bloomRings.forEach(r=>{
      r.t+=delta*0.035; if(r.t<0) return;
      r.g.scale.set(1+r.t*40); r.g.alpha=Math.max(0,1-r.t*1.2);
    });
    if(t>1.2){
      app.ticker.remove(tick); bloom.alpha=0;
      PIXI_APP.shardContainer.removeChildren();
      PIXI_APP.flareContainer.removeChildren();
      app.stage.removeChild(bloom);
      onDone&&onDone();
    }
  };
  app.ticker.add(tick);
}

function spawnFireflies(rarity){
  const app=PIXI_APP.app;
  const isUnique=rarity==='unique';
  const c1=isUnique?0xfbbf24:0x8A2BE2;
  const c2=isUnique?0xfde68a:0xc084fc;
  const c3=isUnique?0xf59e0b:0x7c3aed;
  const W=393,H=852;
  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const g=new PIXI.Graphics();
      const c=[c1,c2,c3][Math.floor(Math.random()*3)];
      const size=1.5+Math.random()*3;
      g.beginFill(c,1); g.drawCircle(0,0,size); g.endFill();
      g.beginFill(c,0.2); g.drawCircle(0,0,size*3); g.endFill();
      g.x=W*(0.1+Math.random()*0.8); g.y=H*(0.3+Math.random()*0.6);
      PIXI_APP.fireflyContainer.addChild(g);
      const phase=Math.random()*Math.PI*2, speed=0.2+Math.random()*0.5;
      const amplitude=15+Math.random()*25, riseSpeed=0.3+Math.random()*0.8;
      let lt=0;
      const tick=(delta)=>{
        lt+=delta*0.016*speed;
        g.x+=Math.sin(lt*2.3+phase)*amplitude*0.012*delta;
        g.y-=riseSpeed*delta*0.4;
        g.alpha=0.5+Math.sin(lt*3+phase)*0.5;
        if(g.y<-20){ g.y=H+10; g.x=W*(0.1+Math.random()*0.8); lt=Math.random()*Math.PI*2; }
      };
      app.ticker.add(tick);
    }, i*40);
  }
}

function startOrbAmbient(rarity,cx,cy){
  const app=PIXI_APP.app;
  const isUnique=rarity==='unique';
  const c1=isUnique?0xfbbf24:0x8A2BE2;
  const c2=isUnique?0xfde68a:0xc084fc;
  const tick=(delta)=>{
    if(Math.random()<0.2) spawnSparkle(cx+(Math.random()-0.5)*80, cy+(Math.random()-0.5)*80, c1,c2);
  };
  app.ticker.add(tick);
  PIXI_APP.ambientTicker=tick;
}

function stopOrbAmbient(){
  if(PIXI_APP.ambientTicker) PIXI_APP.app?.ticker?.remove(PIXI_APP.ambientTicker);
}

// ── BATTLE RESULT PIXI: Blood particles + victory light ──────────────────────
function spawnVictoryBurst(cx, cy) {
  if(!PIXI_APP.app) return;
  const app = PIXI_APP.app;
  const colors = [0xfbbf24, 0xf59e0b, 0xfde68a, 0xffffff];
  for(let i=0;i<40;i++){
    const g=new PIXI.Graphics();
    const c=colors[Math.floor(Math.random()*colors.length)];
    g.beginFill(c,1); g.drawCircle(0,0,2+Math.random()*4); g.endFill();
    g.x=cx; g.y=cy;
    const angle=Math.random()*Math.PI*2;
    const speed=3+Math.random()*8;
    const vx=Math.cos(angle)*speed, vy=Math.sin(angle)*speed-4;
    PIXI_APP.flareContainer.addChild(g);
    let t=0;
    const tick=(delta)=>{
      t+=delta*0.04; g.x+=vx*delta*0.6; g.y+=vy*delta*0.6;
      g.vy+=delta*0.3;
      g.alpha=Math.max(0,1-t);
      if(t>=1){ app.ticker.remove(tick); PIXI_APP.flareContainer.removeChild(g); }
    };
    app.ticker.add(tick);
  }
  // Central flash ring
  spawnShockwave(cx, cy, 0xfbbf24);
}
</script>

/* ── LOOT DATA ────────────────────────────────────────────── */
const LOOT_ITEMS = [

];

const RARITY = {

/* ── TRANSITION OVERLAY ───────────────────────────────────── */
function TransitionOverlay({ active, color, onDone }) {
  const ref = useRef(null);
  useEffect(()=>{
    if(!active || !ref.current) return;
    const el = ref.current;
    el.style.transform = 'translateY(-100%)';
    el.style.transition = 'none';
    el.getBoundingClientRect();
    el.style.transition = 'transform 0.55s cubic-bezier(0.76,0,0.24,1)';
    el.style.transform = 'translateY(0%)';
    const t1 = setTimeout(()=>{
      el.style.transition = 'transform 0.45s cubic-bezier(0.76,0,0.24,1) 0.15s';
      el.style.transform = 'translateY(100%)';
    }, 600);
    const t2 = setTimeout(()=>{ onDone&&onDone(); }, 900);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); };
  },[active]);

  return (
    <div ref={ref} style={{
      position:"absolute", inset:0, zIndex:100,
      background:`linear-gradient(180deg, ${color}ee 0%, ${color} 50%, #04020e 100%)`,
      transform:"translateY(-100%)",
      pointerEvents: active ? "all" : "none",
    }}/>
  );
}

/* ── ORB TAP HINT ─────────────────────────────────────────── */

  const rc = RARITY[rarity];
  return (
    <div style={{

      alignItems:"center", justifyContent:"center",
      pointerEvents:"all", zIndex:10,
    }} onClick={onTap}>

        <div style={{
          fontFamily:"'Cinzel'", fontSize:11,

/* ── LOOT DROP SCREEN ─────────────────────────────────────── */
function LootDropScreen({ item, onReset }) {
  const [stage, setStage] = useState("falling");
  const [orbRef, setOrbRef] = useState(null);

  useEffect(()=>{
    // Re-init pixi for loot drop with proper rarity BG
    const app = initPixi(item.rarity);
    const cx=393/2, landY=852*0.38;
    const orbCtrl = spawnOrb(item.rarity, ()=>{
      setTimeout(()=>{
        setStage("pulsing");
        startOrbAmbient(item.rarity, cx, landY);
        setTimeout(()=>{
          setStage(prev=>{
            if(prev==="pulsing"){ doShatter(item.rarity); return "shattering"; }
            return prev;
          });
        }, 3500);
      }, 200);
    });
    setOrbRef(orbCtrl);
  },[]);

  function doShatter(rarity){
    stopOrbAmbient();
    setStage("shattering");
    triggerShatter(rarity, 393/2, 852*0.38, ()=>{
      setStage("revealed");
    });
  }

  function handleOrbTap(){
    if(stage!=="pulsing") return;
    doShatter(item.rarity);
  }

  const rc = RARITY[item.rarity];

  return (
    <div style={{
      position:"absolute", inset:0,
      background: `radial-gradient(ellipse at 50% 38%, ${rc.glow}15 0%, #04020e 65%)`,
      animation:"fadeIn 0.4s ease-out",
    }}>
      {/* Rarity label at top */}
      <div style={{
        position:"absolute", top:52, left:0, right:0,
        display:"flex", flexDirection:"column", alignItems:"center",
        zIndex:20, pointerEvents:"none",
        animation:"slideUp 0.5s ease-out 0.3s both",
      }}>
        <div style={{
          fontFamily:"'Inter'", fontSize:9, color:"#6b7280",
          letterSpacing:"0.18em", marginBottom:6,
        }}>ITEM DROP</div>
        <div style={{
          fontFamily:"'Cinzel'", fontSize:18, fontWeight:900,
          color:rc.text, textShadow:`0 0 16px ${rc.glow}80`,
        }}>{item.name}</div>
        <div style={{
          marginTop:6, padding:"3px 12px", borderRadius:4,
          background:rc.labelBg, backgroundSize:"200% 100%",
          animation:"shimmerLoop 2s linear infinite",
          fontFamily:"'Cinzel'", fontSize:9, fontWeight:700,
          color:"#fff", letterSpacing:"0.18em",
          boxShadow:`0 0 10px ${rc.glow}60`,
        }}>{rc.label}</div>
      </div>

      {stage==="pulsing" && <OrbTapHint rarity={item.rarity} onTap={handleOrbTap}/>}
      {stage==="revealed" && (
        <div style={{position:"absolute", inset:0, zIndex:20}}>
          <ItemCard item={item} visible={true}/>
          <div onClick={onReset} style={{
            position:"absolute", top:52, left:20,
            display:"flex", alignItems:"center", gap:4,
            cursor:"pointer", fontFamily:"'Inter'", fontSize:11,
            color:"#8b7da8", zIndex:30,
          }}>
            <span style={{fontSize:14}}>‹</span> はじめに戻る
          </div>
        </div>
      )}
      {stage==="falling" && (
        <div style={{
          position:"absolute", inset:0, zIndex:5,
          display:"flex", alignItems:"flex-end", justifyContent:"center",
          paddingBottom:60,
        }}>
          <div style={{
            fontFamily:"'Inter'", fontSize:10,
            color:"rgba(255,255,255,0.2)", letterSpacing:"0.1em",
          }}>...</div>
        </div>
      )}
    </div>
  );
}

/* ── ROOT APP ─────────────────────────────────────────────── */
function App() {
  // screen: "battle" | "transition-to-result" | "result" | "transition-to-loot" | "loot"
  const [screen, setScreen] = useState("battle");
  const [transitionActive, setTransitionActive] = useState(false);
  const [selectedItem] = useState(LOOT_ITEMS[0]); // unique drop

  function goToResult() {
    setTransitionActive(true);
  }

  function onTransitionDone() {
    setTransitionActive(false);
    setScreen(prev => {
      if(prev==="battle") return "result";
      if(prev==="result") return "loot";
      return prev;
    });
  }

  function goToLoot() {
    // Destroy battle pixi, start fresh
    if(PIXI_APP.app){ PIXI_APP.app.destroy(false); PIXI_APP.app=null; }
    const canvas = document.getElementById('pixi-canvas');
    if(canvas) canvas.remove();
    setTransitionActive(true);
  }

  function handleReset() {
    if(PIXI_APP.app){ PIXI_APP.app.destroy(false); PIXI_APP.app=null; }
    const canvas = document.getElementById('pixi-canvas');
    if(canvas) canvas.remove();
    setScreen("battle");
    setTransitionActive(false);
  }

  return (
    <div style={{width:"100%", height:"100%", position:"relative", overflow:"hidden"}}>
      {/* ── SCREENS ── */}
      {screen==="battle" && (
        <BattleScreen onVictory={goToResult}/>
      )}
      {screen==="result" && (
        <ResultScreen onProceed={goToLoot}/>
      )}
      {screen==="loot" && (
        <LootDropScreen item={selectedItem} onReset={handleReset}/>
      )}

      {/* ── TRANSITION WIPE ── */}
      <TransitionOverlay
        active={transitionActive}
        color={screen==="battle" || screen==="result" ? "#1c1000" : "#04020e"}
        onDone={onTransitionDone}
      />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
