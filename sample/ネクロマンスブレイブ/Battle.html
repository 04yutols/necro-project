<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%; height:100%; background:#06050f; display:flex; align-items:center; justify-content:center; overflow:hidden; }

@keyframes waveReveal {
  0% { opacity:0; transform:scale(1.3); }
  60% { opacity:1; transform:scale(0.97); }
  100% { opacity:1; transform:scale(1); }
}
@keyframes resultSlideIn {
  from { opacity:0; transform:translateY(40px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes rankPop {
  0% { transform:scale(0) rotate(-20deg); opacity:0; }
  70% { transform:scale(1.15) rotate(3deg); opacity:1; }
  100% { transform:scale(1) rotate(0deg); opacity:1; }
}
@keyframes rewardReveal {
  from { opacity:0; transform:translateX(-16px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes bossAlert {
  0%,100% { transform:scale(1); }
  50% { transform:scale(1.04); }
}
@keyframes expGrow {
  from { width:0%; }
  to   { width:var(--exp-width); }
}
@keyframes floatDmg {
  0%   { transform: translateY(0) scale(1);  opacity: 1; }
  60%  { transform: translateY(-48px) scale(1.1); opacity: 1; }
  100% { transform: translateY(-72px) scale(0.8); opacity: 0; }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
@keyframes enemyHit {
  0%,100% { filter: brightness(1); }
  30% { filter: brightness(3) saturate(0); }
  60% { filter: brightness(1.5); }
}
@keyframes breathe {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
@keyframes demonPulse {
  0%,100% { box-shadow: 0 0 18px #dc262680, inset 0 0 14px #dc262630; }
  50% { box-shadow: 0 0 36px #dc2626cc, inset 0 0 28px #dc262660; }
}
@keyframes soulFill {
  from { background-position: 200% center; }
  to   { background-position: 0% center; }
}
@keyframes commandReveal {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}
@keyframes turnChipIn {
  from { opacity: 0; transform: scale(0.7); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes screenFlash {
  0%   { opacity: 0; }
  15%  { opacity: 0.55; }
  100% { opacity: 0; }
}
@keyframes logFade {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes particleRise {
  0%   { opacity: 0.9; transform: translateY(0) scale(1); }
  100% { opacity: 0;   transform: translateY(-55px) scale(0.2); }
}
@keyframes skillReveal {
  from { opacity: 0; transform: translateY(10px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>

let floatId = 0;
function DamageFloat({ floats }) {

        <div key={f.id} style={{
          position:"absolute",
          left: f.x, top: f.y,

          fontWeight: 900,
          color: f.color || (f.heal ? "#4ade80" : "#fff"),

// ── BATTLE ARENA ──────────────────────────────────────────────────────────────
function BattleArena({ enemies, onTargetEnemy, demonized, flashColor, screenShake }) {
  const POSITIONS = {
    left:   { left:"6%",  width:"30%", alignSelf:"flex-end", paddingBottom:12 },
    center: { left:"32%", width:"38%", alignSelf:"flex-end", paddingBottom:4 },
    right:  { left:"64%", width:"32%", alignSelf:"flex-end", paddingBottom:16 },
  };

  return (
    <div style={{
      position:"relative", flexShrink:0, height:200,
      background: demonized
        ? "linear-gradient(180deg, #1a0208 0%, #0d0108 100%)"
        : "linear-gradient(180deg, #0d0420 0%, #07021a 100%)",
      overflow:"hidden",
      animation: screenShake ? "shake 0.4s ease-out" : "none",
      transition:"background 0.8s ease",
    }}>
      {/* Background terrain */}
      <svg style={{ position:"absolute", inset:0, width:"100%", height:"100%" }} viewBox="0 0 393 260" preserveAspectRatio="xMidYMid slice">
        <defs>
          <radialGradient id="arenaGlow" cx="50%" cy="100%" r="60%">
            <stop offset="0%" stopColor={demonized ? "#3a0810" : "#1a0838"} stopOpacity="0.9"/>
            <stop offset="100%" stopColor={demonized ? "#0d0208" : "#05021a"} stopOpacity="1"/>
          </radialGradient>
        </defs>
        <rect width="393" height="260" fill="url(#arenaGlow)"/>
        {/* Ground */}
        <path d="M0 200 Q100 185 200 195 Q300 205 393 190 L393 260 L0 260Z" fill="#0a0520" opacity="0.8"/>
        <path d="M0 210 Q100 198 200 205 Q300 212 393 200 L393 260 L0 260Z" fill="#07031a" opacity="0.9"/>
        {/* Ground crack glow */}
        <path d="M80 212 Q120 208 160 210 Q200 212 240 208 Q280 205 320 210"
          stroke={demonized ? "#dc2626" : "#8A2BE2"} strokeWidth="1" strokeOpacity="0.3" fill="none"/>
        {/* Mountains bg */}
        {[[30,180],[90,160],[150,175],[230,155],[300,165],[360,172]].map(([x,y],i) => (
          <polygon key={i} points={`${x},${y} ${x-35},210 ${x+35},210`}
            fill="#0d0520" opacity={0.6+i*0.05}/>
        ))}
        {/* Stars */}
        {[...Array(24)].map((_,i) => (
          <circle key={i} cx={Math.random()*393} cy={Math.random()*120}
            r={0.8+Math.random()*1.2} fill="#fff" opacity={0.2+Math.random()*0.4}/>
        ))}
        {/* Demonized atmosphere extras */}
        {demonized && (
          <>
            <ellipse cx="196" cy="260" rx="180" ry="60" fill="#dc2626" opacity="0.08"/>
            <path d="M50 180 Q100 160 150 170 Q200 180 250 160 Q300 140 350 170"
              stroke="#dc2626" strokeWidth="1.5" strokeOpacity="0.2" fill="none"/>
          </>
        )}
        {/* Floor particles */}
        {[...Array(10)].map((_,i) => (
          <circle key={i}
            cx={30+i*38} cy={205+Math.sin(i)*5}
            r={1.5+Math.random()}
            fill={demonized ? "#dc2626" : "#8A2BE2"} opacity="0.5">
          </circle>
        ))}
      </svg>

      {/* Demonize screen overlay */}
      {demonized && (
        <div style={{
          position:"absolute", inset:0,
          background:"radial-gradient(ellipse at center bottom, rgba(220,38,38,0.12), transparent 70%)",
          pointerEvents:"none",
        }}/>
      )}
      {/* Flash overlay */}
      {flashColor && (
        <div style={{
          position:"absolute", inset:0, background:flashColor,
          animation:"screenFlash 0.5s ease-out forwards", pointerEvents:"none", zIndex:25,
        }}/>
      )}

      {/* Enemy sprites */}
      <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"flex-end" }}>
        {enemies.filter(e => e.hp > 0).map(enemy => (
          <div key={enemy.id} onClick={() => onTargetEnemy(enemy.id)}
            style={{
              position:"absolute",
              ...POSITIONS[enemy.pos],
              cursor:"pointer",
              display:"flex", flexDirection:"column", gap:4,
              transform:`scale(${enemy.size})`, transformOrigin:"bottom center",
            }}>
            {/* HP bar */}
            <div style={{
              width:"100%", height:5, background:"rgba(0,0,0,0.5)",
              borderRadius:3, border:"1px solid rgba(255,255,255,0.1)",
              marginBottom:4,
            }}>
              <div style={{
                width:`${(enemy.hp/enemy.maxHp)*100}%`, height:"100%",
                background: enemy.hp/enemy.maxHp > 0.5
                  ? "linear-gradient(90deg,#22c55e,#4ade80)"
                  : enemy.hp/enemy.maxHp > 0.25
                  ? "linear-gradient(90deg,#f59e0b,#fbbf24)"
                  : "linear-gradient(90deg,#ef4444,#f87171)",
                borderRadius:3,
                boxShadow:"0 0 6px rgba(255,255,255,0.3)",
                transition:"width 0.5s ease",
              }}/>
            </div>
            {/* Enemy name */}
            <div style={{
              textAlign:"center",
              fontFamily:"'Cinzel', serif", fontSize:8.5, fontWeight:600,
              color: enemy.targeted ? enemy.color : "#6b5f7a",
              letterSpacing:"0.06em",
              textShadow: enemy.targeted ? `0 0 8px ${enemy.color}` : "none",
              transition:"color 0.2s",
            }}>{enemy.name}</div>
            {/* Target marker */}
            {enemy.targeted && (
              <div style={{
                position:"absolute", top:-16, left:"50%", transform:"translateX(-50%)",
                fontSize:14, animation:"breathe 1s ease-in-out infinite",
              }}>▼</div>
            )}
            {/* SVG sprite */}
            <div style={{ width:"100%", aspectRatio:"1/1.15" }}>
              {enemy.id===0 && <WraithKnightSVG hit={enemy.hit} targeted={enemy.targeted} color={enemy.color}/>}
              {enemy.id===1 && <BoneGiantSVG    hit={enemy.hit} targeted={enemy.targeted} color={enemy.color}/>}
              {enemy.id===2 && <BoneDragonSVG   hit={enemy.hit} targeted={enemy.targeted} color={enemy.color}/>}
            </div>
          </div>
        ))}
      </div>

      {/* Floating damage numbers */}
    </div>
  );
}

// ── SOUL GAUGE ────────────────────────────────────────────────────────────────

  return (
    <div style={{
      padding:"4px 14px",
      display:"flex", alignItems:"center", gap:10,
      background: demonized ? "rgba(30,4,4,0.9)" : "rgba(4,2,14,0.9)",

      transition:"background 0.6s ease",
      flexShrink:0,
    }}>
      <div style={{
        fontFamily:"'Cinzel', serif", fontSize:9, fontWeight:700,
        color: demonized ? "#dc2626" : "#8A2BE2",
        letterSpacing:"0.1em", flexShrink:0,
        textShadow: full ? `0 0 8px ${demonized ? "#dc2626" : "#8A2BE2"}` : "none",
      }}>☠ SOUL</div>
      <div style={{
        flex:1, height:8, background:"rgba(255,255,255,0.06)",
        borderRadius:4, overflow:"hidden",
        border:`1px solid ${full ? (demonized ? "#dc262660" : "#8A2BE260") : "rgba(255,255,255,0.08)"}`,
        boxShadow: full ? `0 0 12px ${demonized ? "#dc262680" : "#8A2BE280"}` : "none",
      }}>
        <div style={{
          width:`${pct}%`, height:"100%", borderRadius:4,
          background: demonized
            ? "linear-gradient(90deg,#7f1d1d,#dc2626,#ef4444)"
            : "linear-gradient(90deg,#4a0e8a,#8A2BE2,#c084fc,#8A2BE2)",
          backgroundSize:"200% 100%",
          animation: full ? "soulFill 1.5s linear infinite" : "none",
          boxShadow: full ? "0 0 10px #8A2BE2" : "none",
          transition:"width 0.6s ease",
        }}/>

      <div style={{
        fontFamily:"'Cinzel', serif", fontSize:9, fontWeight:700,
        color: full ? (demonized ? "#dc2626" : "#c084fc") : "#4a3a5a",
        flexShrink:0,
      }}>{full ? (demonized ? "解放中" : "MAX") : `${Math.round(pct)}%`}</div>
    </div>
  );
}

// ── COMMAND PANEL ─────────────────────────────────────────────────────────────
function CommandButton({ label, sublabel, icon, enabled, color, onClick, glow, demonized }) {
  const [pressed, setPressed] = useState(false);
  return (
    <div onClick={() => { if(!enabled) return; setPressed(true); setTimeout(()=>setPressed(false),150); onClick(); }}
      style={{
        flex:1, padding:"10px 6px",
        background: !enabled ? `${color}12`
          : pressed ? `${color}35`
          : demonized ? `linear-gradient(135deg,${color}28,${color}12)`
          : `linear-gradient(135deg,${color}22,${color}0e)`,
        border:`1px solid ${enabled ? (glow ? color : color+"60") : color+"35"}`,
        borderRadius:14,
        cursor: enabled ? "pointer" : "default",
        opacity: enabled ? 1 : 0.55,
        transform: pressed ? "scale(0.95)" : "scale(1)",
        transition:"all 0.15s ease",
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:3,
        boxShadow: glow && enabled ? `0 0 16px ${color}50, inset 0 0 10px ${color}18` : "none",
        animation: enabled && glow ? "demonPulse 1.5s ease-in-out infinite" : "none",
        position:"relative", overflow:"hidden",
      }}>
      {enabled && glow && <div style={{
        position:"absolute", inset:0, borderRadius:14,
        background:`linear-gradient(90deg,transparent,${color}18,transparent)`,
        backgroundSize:"200% 100%",
        animation:"shimmer 1.8s infinite",
      }}/>}
      <div style={{ fontSize:20 }}>{icon}</div>
      <div style={{
        fontFamily:"'Cinzel', serif", fontSize:11, fontWeight:700,
        color: enabled ? "#f0ebff" : `${color}70`,
        letterSpacing:"0.04em", lineHeight:1,
      }}>{label}</div>
      {sublabel && <div style={{
        fontFamily:"'Inter', sans-serif", fontSize:8,
        color: enabled ? color+"90" : `${color}45`,
        letterSpacing:"0.08em",
      }}>{sublabel}</div>}
    </div>
  );
}

function SkillButton({ skill, mp, onClick, demonized }) {
  const canUse = demonized ? true : mp >= skill.mp;
  return (
    <div onClick={() => canUse && onClick(skill)} style={{
      padding:"10px 8px",
      background: canUse ? `linear-gradient(135deg,rgba(138,43,226,0.2),rgba(138,43,226,0.08))`

      <div style={{ fontSize:22 }}>{skill.icon}</div>
      <div style={{

// ── BATTLE LOG ────────────────────────────────────────────────────────────────
function BattleLog({ lines }) {

  return (
    <div ref={ref} style={{
      padding:"6px 14px",
      height:48, flexShrink:0,
      background:"linear-gradient(180deg,rgba(3,1,12,0.6),rgba(5,2,16,0.85))",

      overflowY:"auto",
      display:"flex", flexDirection:"column", justifyContent:"flex-end",
      gap:2,

      {lines.slice(-3).map((line,i) => (
        <div key={i} style={{
          fontFamily:"'Inter', sans-serif", fontSize:10, lineHeight:1.4,
          color: i === lines.slice(-3).length-1 ? "#e2d8f0" : "#6b5f7a",

        </div>

}

// ── MAIN BATTLE ───────────────────────────────────────────────────────────────
function BattleScreen() {
  const [waveIndex, setWaveIndex] = useState(0);
  const [enemies,  setEnemies]  = useState(WAVES[0].enemies.map(e => ({...e})));
  const [party,    setParty]    = useState(INIT_PARTY.map(p => ({...p})));
  const [soul,     setSoul]     = useState(45);
  const [phase,    setPhase]    = useState("playerTurn"); // playerTurn|skillMenu|itemMenu|animating|enemyTurn|waveTransition|result
  const [demonized,setDemonized]= useState(false);
  const [demonTurns,setDemonTurns]=useState(0);
  const [auto,     setAuto]     = useState(false);
  const [speed,    setSpeed]    = useState(1);
  const [battleTime, setBattleTime] = useState(0);
  const [log,      setLog]      = useState([
    "戦闘開始！骸骨山脈の番人たちが立ちはだかる。",
    "WAVE 1 開始。骸骨騎士のターン。",
  ]);
  const [floats,   setFloats]   = useState([]);
  const [flashColor,setFlashColor]=useState(null);
  const [screenShake,setScreenShake]=useState(false);
  const [waveClearing, setWaveClearing] = useState(false);
  const [totalExp, setTotalExp] = useState(0);
  const [totalGold, setTotalGold] = useState(0);
  const timerRef = useRef(null);

  const speedMs = 900 / speed;
  const currentMp = party[0]?.mp ?? 0;
  const soulFull = soul >= 100;

  function addLog(line) { setLog(prev => [...prev, line]); }

  function spawnFloat(x, y, value, opts={}) {
    const id = ++floatId;
    setFloats(prev => [...prev, { id, x, y, value, ...opts }]);
    setTimeout(() => setFloats(prev => prev.filter(f => f.id !== id)), 1200);
  }

  function doEnemyHit(eid) {
    setEnemies(prev => prev.map(e => e.id===eid ? {...e, hit:true} : e));
    setTimeout(() => setEnemies(prev => prev.map(e => ({...e, hit:false}))), 500);
  }

  function damageEnemy(targetId, dmg, opts={}) {
    const isCrit = Math.random() < 0.2;
    const finalDmg = isCrit ? Math.round(dmg * 1.5) : dmg;
    doEnemyHit(targetId);
    const positions = { 0:{x:"12%",y:"18%"}, 1:{x:"36%",y:"12%"}, 2:{x:"62%",y:"16%"} };
    const pos = positions[targetId] || {x:"40%",y:"15%"};
    spawnFloat(pos.x, pos.y, finalDmg, { crit:isCrit, color: opts.color || "#fff" });
    let next;
    setEnemies(prev => {
      next = prev.map(e => e.id === targetId ? {...e, hp: Math.max(0, e.hp - finalDmg)} : e);
      return next;
    });
    // Defer wave check so state is settled
    setTimeout(() => {
      setEnemies(prev => { checkWaveClear(prev); return prev; });
    }, 350);
    return finalDmg;
  }

  function damageParty(partyIdx, dmg) {
    setParty(prev => prev.map((m,i) =>
      i === partyIdx ? {...m, hp: Math.max(0, m.hp - dmg)} : m
    ));
    spawnFloat("42%","58%", dmg, { color:"#f87171" });
    setScreenShake(true);
    setTimeout(() => setScreenShake(false), 450);
  }

  function getTargetId() {
    const t = enemies.find(e => e.targeted && e.hp > 0);
    return t ? t.id : enemies.find(e => e.hp > 0)?.id ?? 0;
  }

  function checkWaveClear(currentEnemies) {
    const alive = currentEnemies.filter(e => e.hp > 0);
    if (alive.length > 0) return false;
    // Wave cleared!
    const wave = WAVES[waveIndex];
    const earnedExp = wave.rewards.exp;
    const earnedGold = wave.rewards.gold;
    setTotalExp(prev => prev + earnedExp);
    setTotalGold(prev => prev + earnedGold);
    setWaveClearing(true);
    setPhase("waveTransition");
    addLog(`★ WAVE ${wave.wave} クリア！EXP +${earnedExp} / Gold +${earnedGold}G`);
    setTimeout(() => {
      setWaveClearing(false);
      const nextIdx = waveIndex + 1;
      if (nextIdx >= WAVES.length) {
        // All waves done → result
        setPhase("result");
        clearInterval(timerRef.current);
      } else {
        // Next wave
        const nextWave = WAVES[nextIdx];
        setWaveIndex(nextIdx);
        setEnemies(nextWave.enemies.map(e => ({...e})));
        setPhase("playerTurn");
        if (nextWave.isBoss) {
          addLog(`☠ BOSS登場！ ${nextWave.enemies[0].name} が現れた！`);
          setFlashColor("rgba(245,158,11,0.35)");
          setTimeout(() => setFlashColor(null), 600);
        } else {
          addLog(`WAVE ${nextWave.wave} 開始！`);
        }
      }
    }, 2200);
    return true;
  }

  function endPlayerTurn() {
    // Check demonized turn countdown
    let newDemon = demonized;
    let newTurns = demonTurns;
    if (demonized) {
      newTurns = demonTurns - 1;
      if (newTurns <= 0) {
        newDemon = false;
        newTurns = 0;
        addLog("魔神化が解除された。通常形態に戻る。");
        setDemonized(false);
      }
      setDemonTurns(newTurns);
    }
    // Soul gain from action
    setSoul(prev => Math.min(100, prev + (demonized ? -20 : 10)));
    setTimeout(() => runEnemyTurn(), speedMs * 0.4);
  }

  function runEnemyTurn() {
    setPhase("enemyTurn");
    const alive = enemies.filter(e => e.hp > 0);
    if (alive.length === 0) { setPhase("playerTurn"); return; }

    let delay = 0;
    alive.forEach((enemy, i) => {
      delay += speedMs * 0.55;
      setTimeout(() => {
        const dmg = Math.round(enemy.atk * (0.8 + Math.random() * 0.4));
        const target = Math.floor(Math.random() * party.length);
        damageParty(target, dmg);
        addLog(`${enemy.name}の攻撃！ ${party[target].name}に ${dmg}ダメージ！`);
        setFlashColor("rgba(239,68,68,0.25)");
        setTimeout(() => setFlashColor(null), 300);
      }, delay);
    });

    setTimeout(() => {
      setPhase("playerTurn");
      addLog("骸骨騎士のターン。コマンドを選択しろ。");
    }, delay + speedMs * 0.4);
  }

  // ── Player actions
  function handleAttack() {
    if (phase !== "playerTurn") return;
    setPhase("animating");
    const tid = getTargetId();
    const enemy = enemies.find(e => e.id === tid);
    const dmg = demonized ? Math.round(1500 * (0.9 + Math.random() * 0.2)) : Math.round(1500 * (0.75 + Math.random() * 0.25));
    addLog(demonized ? `殲滅！ ${enemy?.name}に圧倒的攻撃！` : `骸骨騎士の攻撃！ ${enemy?.name}を狙う！`);
    setTimeout(() => {
      damageEnemy(tid, dmg, { color: demonized ? "#dc2626" : "#f0ebff" });
      if (demonized) {
        setFlashColor("rgba(220,38,38,0.3)");
        setTimeout(() => setFlashColor(null), 350);
      }
      setTimeout(() => {
        addLog(`${enemy?.name}に ${dmg}ダメージ！`);
        setPhase("playerTurn");
        endPlayerTurn();
      }, speedMs * 0.4);
    }, speedMs * 0.3);
  }

  function handleSkill(skill) {
    setPhase("animating");
    // MP / cost deduction
    if (!demonized) {
      setParty(prev => prev.map((m,i) => i===0 ? {...m, mp: Math.max(0, m.mp - skill.mp)} : m));
    } else {
      const hpCost = parseInt(skill.cost) || 50;
      setParty(prev => prev.map((m,i) => i===0 ? {...m, hp: Math.max(1, m.hp - Math.abs(hpCost))} : m));
    }
    // Soul cost for demon skills
    if (skill.demonOnly && skill.id === 11) setSoul(0);
    const targets = skill.aoe ? enemies.filter(e => e.hp > 0).map(e => e.id) : [getTargetId()];
    addLog(`${demonized ? "魔神技" : "術"}発動！ ${skill.name}！`);
    setFlashColor(`rgba(138,43,226,0.3)`);
    setTimeout(() => setFlashColor(null), 400);
    setTimeout(() => {
      targets.forEach((tid, i) => {
        setTimeout(() => {
          const dmg = Math.round(skill.power * (0.85 + Math.random() * 0.3));
          damageEnemy(tid, dmg, { color:"#c084fc" });
          addLog(`${enemies.find(e=>e.id===tid)?.name}に ${dmg}ダメージ！`);
        }, i * 200);
      });
      setTimeout(() => {
        setPhase("playerTurn");
        endPlayerTurn();
      }, targets.length * 200 + speedMs * 0.3);
    }, speedMs * 0.4);
  }

  function handleItem(item) {
    setPhase("animating");
    if (item.effect === "heal") {
      setParty(prev => prev.map((m,i) => i===0 ? {...m, hp: Math.min(m.maxHp, m.hp + item.value)} : m));
      spawnFloat("42%","52%", item.value, { heal:true, color:"#4ade80" });
      addLog(`冥界薬を使用！ HP+${item.value}回復！`);
    } else if (item.effect === "mpHeal") {
      setParty(prev => prev.map((m,i) => i===0 ? {...m, mp: m.maxMp} : m));
      addLog(`エーテルを使用！ MPが全回復！`);
    }
    setTimeout(() => { setPhase("playerTurn"); endPlayerTurn(); }, speedMs * 0.5);
  }

  function handleDemonize() {
    if (!soulFull) return;
    setDemonized(true);
    setDemonTurns(3);
    setSoul(100);
    setFlashColor("rgba(180,0,0,0.5)");
    setTimeout(() => setFlashColor(null), 800);
    addLog("☠ 魔神化発動！闇の力が解放される！");
    addLog("全コマンドが魔神専用に切り替わった。3ターン継続。");
    setPhase("playerTurn");
  }

  function handleTargetEnemy(eid) {
    if (enemies.find(e => e.id === eid)?.hp <= 0) return;
    setEnemies(prev => prev.map(e => ({...e, targeted: e.id === eid})));
  }

  // Battle timer
  useEffect(() => {
    timerRef.current = setInterval(() => setBattleTime(t => t + 1), 1000);
    return () => clearInterval(timerRef.current);
  }, []);

  // Auto battle
  useEffect(() => {
    if (!auto || phase !== "playerTurn") return;
    const t = setTimeout(() => handleAttack(), speedMs * 0.4);
    return () => clearTimeout(t);
  }, [auto, phase]);

  const mainSkills = demonized ? DEMON_SKILLS : SKILLS;

  return (
    <div style={{
      width:"100%", height:"100%",
      width:"100%", height:"100%",
      display:"flex", flexDirection:"column",
      background:"#06050f",
      position:"relative", overflow:"hidden",
      fontFamily:"'Inter', sans-serif",
    }}>
      {/* ── TOP HUD ── */}
      <div style={{
        padding:"54px 12px 4px",
        background:"linear-gradient(180deg,rgba(3,1,12,0.92),rgba(3,1,12,0.6) 70%, transparent)",
        zIndex:10, flexShrink:0,
      }}>
        {/* Back + title */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
          <a href="Map.html" style={{
            display:"flex", alignItems:"center", gap:4,
            textDecoration:"none",
            fontFamily:"'Inter', sans-serif", fontSize:10, color:"#8b7da8",
          }}>
            <span style={{fontSize:13}}>‹</span><span>マップ</span>
          </a>
          <div style={{
            fontFamily:"'Cinzel', serif", fontSize:11, fontWeight:700,
            color: demonized ? "#ef4444" : WAVES[waveIndex]?.isBoss ? "#f59e0b" : "#8A2BE2",
            letterSpacing:"0.12em",
            textShadow: demonized ? "0 0 12px #dc2626" : WAVES[waveIndex]?.isBoss ? "0 0 12px #f59e0b" : "0 0 8px #8A2BE2",
            transition:"all 0.5s ease",
          }}>{demonized ? "☠ 魔神化中" : WAVES[waveIndex]?.isBoss ? "⚠ BOSS" : `骸骨山脈 — WAVE ${waveIndex+1}/${WAVES.length}`}</div>
          <div style={{
            fontFamily:"'Inter', sans-serif", fontSize:9,
            color: phase==="playerTurn" ? "#22c55e" : phase==="enemyTurn" ? "#ef4444" : "#f59e0b",
            display:"flex", alignItems:"center", gap:4,
          }}>
            <div style={{
              width:5, height:5, borderRadius:"50%",
              background: phase==="playerTurn" ? "#22c55e" : phase==="enemyTurn" ? "#ef4444" : "#f59e0b",
            }}/>
            {phase==="playerTurn" ? "自ターン" : phase==="enemyTurn" ? "敵ターン" : "行動中"}
          </div>
        </div>
        {/* Turn order */}
        <TurnOrderStrip/>
      </div>

      {/* ── BATTLE ARENA ── */}
      <BattleArena
        enemies={enemies}
        onTargetEnemy={handleTargetEnemy}
        demonized={demonized}
        flashColor={flashColor}
        screenShake={screenShake}/>

      {/* Damage floats overlay */}
      <DamageFloat floats={floats}/>

      {/* ── BATTLE LOG ── */}
      <BattleLog lines={log}/>

      {/* ── PARTY STATUS ── */}
      <PartyStatusBar party={party} demonized={demonized}/>

      {/* ── SOUL GAUGE ── */}
      <SoulGauge value={soul} max={100} demonized={demonized}/>

      {/* ── COMMAND PANEL ── */}
      <div style={{
        padding:"6px 12px",
        background: demonized
          ? "linear-gradient(180deg,rgba(15,2,2,0.97),rgba(8,1,1,0.99))"
          : "linear-gradient(180deg,rgba(4,1,14,0.97),rgba(3,1,10,0.99))",
        borderTop:`1px solid ${demonized ? "#dc262630" : "rgba(255,255,255,0.07)"}`,
        transition:"background 0.6s ease",
        zIndex:10,
        flexShrink:0,
      }}>
        {phase === "skillMenu" ? (
          /* SKILL SUBMENU */
          <div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
              <div style={{
                fontFamily:"'Cinzel', serif", fontSize:10, fontWeight:600,
                color: demonized ? "#ef4444" : "#8A2BE2", letterSpacing:"0.1em",
              }}>{demonized ? "魔神技選択" : "術・スキル選択"}</div>
              <div onClick={() => setPhase("playerTurn")} style={{
                padding:"3px 10px", borderRadius:6,
                background:"rgba(255,255,255,0.05)",
                border:"1px solid rgba(255,255,255,0.1)",
                fontFamily:"'Inter', sans-serif", fontSize:9, color:"#8b7da8",
                cursor:"pointer",
              }}>← 戻る</div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              {mainSkills.map(skill => (
                <SkillButton key={skill.id} skill={skill} mp={currentMp}
                  onClick={(sk) => { setPhase("playerTurn"); handleSkill(sk); }}
                  demonized={demonized}/>
              ))}
            </div>
            {/* Skill desc */}
            <div style={{
              marginTop:8, padding:"6px 10px",
              background:"rgba(255,255,255,0.03)",
              border:"1px solid rgba(255,255,255,0.06)",
              borderRadius:8,
              fontFamily:"'Inter', sans-serif", fontSize:9, color:"#8b7da8", lineHeight:1.5,
            }}>スキルを選択してください。長押しで詳細確認。</div>
          </div>
        ) : phase === "itemMenu" ? (
          /* ITEM MENU */
          <div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
              <div style={{ fontFamily:"'Cinzel', serif", fontSize:10, fontWeight:600, color:"#f59e0b", letterSpacing:"0.1em" }}>道具選択</div>
              <div onClick={() => setPhase("playerTurn")} style={{
                padding:"3px 10px", borderRadius:6, background:"rgba(255,255,255,0.05)",
                border:"1px solid rgba(255,255,255,0.1)", fontFamily:"'Inter', sans-serif",
                fontSize:9, color:"#8b7da8", cursor:"pointer",
              }}>← 戻る</div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {ITEMS.map(item => (
                <div key={item.id} onClick={() => { setPhase("playerTurn"); handleItem(item); }} style={{
                  display:"flex", alignItems:"center", gap:10,
                  padding:"8px 12px",
                  background:"rgba(255,255,255,0.04)",
                  border:"1px solid rgba(255,255,255,0.08)",
                  borderRadius:10, cursor:"pointer",
                  animation:"skillReveal 0.2s ease-out",
                }}>
                  <div style={{fontSize:18}}>{item.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{ fontFamily:"'Cinzel', serif", fontSize:11, color:"#f0ebff" }}>{item.name}</div>
                    <div style={{ fontFamily:"'Inter', sans-serif", fontSize:9, color:"#8b7da8" }}>{item.desc}</div>
                  </div>
                  <div style={{ fontFamily:"'Inter', sans-serif", fontSize:9, color:"#6b5f7a" }}>×{item.count}</div>
                </div>
              ))}
            </div>
          </div>
        ) : (
          /* MAIN COMMANDS */
          <div style={{ display:"flex", gap:8, animation:"commandReveal 0.3s ease-out" }}>
            <CommandButton
              icon={demonized ? "💥" : "⚔"}
              label={demonized ? "殲滅" : "攻撃"}
              sublabel={demonized ? "ANNIHILATE" : "ATTACK"}
              enabled={phase==="playerTurn"}
              color={demonized ? "#dc2626" : "#8A2BE2"}
              demonized={demonized}
              onClick={handleAttack}/>
            <CommandButton
              icon={demonized ? "🔥" : "🔮"}
              label={demonized ? "魔神技" : "術"}
              sublabel={demonized ? "DEMON ARTS" : "SKILL"}
              enabled={phase==="playerTurn"}
              color={demonized ? "#dc2626" : "#8A2BE2"}
              demonized={demonized}
              onClick={() => setPhase("skillMenu")}/>
            <CommandButton
              icon="🧪"
              label="道具"
              sublabel="ITEM"
              enabled={phase==="playerTurn"}
              color="#f59e0b"
              onClick={() => setPhase("itemMenu")}/>
            <CommandButton
              icon="☠"
              label={demonized ? `残${demonTurns}T` : "魔神化"}
              sublabel={demonized ? "DEMONIZED" : soulFull ? "DEMONIZE" : `SOUL ${Math.round(soul)}%`}
              enabled={soulFull && !demonized}
              color="#dc2626"
              glow={soulFull && !demonized}
              demonized={demonized}
              onClick={handleDemonize}/>
          </div>
        )}
      </div>

      {/* ── SYSTEM BAR ── */}
      <SystemBar
        auto={auto} speed={speed}
        onAuto={() => setAuto(a => !a)}
        onSpeed={() => setSpeed(s => s >= 3 ? 1 : s + 1)}
        onEscape={() => { addLog("逃走した。"); window.location.href="Map.html"; }}
        canEscape={phase==="playerTurn"}/>

      {/* ── WAVE TRANSITION BANNER ── */}
      {waveClearing && (
        <WaveBanner wave={WAVES[waveIndex]} isBoss={false}/>
      )}
      {phase==="waveTransition" && !waveClearing && waveIndex < WAVES.length && WAVES[waveIndex].isBoss && (
        <WaveBanner wave={WAVES[waveIndex]} isBoss={true}/>
      )}

      {/* ── RESULT SCREEN ── */}
      {phase==="result" && (
        <ResultScreen
          party={party}
          totalExp={totalExp}
          totalGold={totalGold}
          battleTime={battleTime}
          onReturn={() => { window.location.href="Map.html"; }}/>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(
  <IOSDevice dark={true} width={393} height={852}>
    <BattleScreen/>
  </IOSDevice>
);
</script>
</body>
</html>
