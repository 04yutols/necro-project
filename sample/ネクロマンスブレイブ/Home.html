<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホーム — ネクロマンスブレイブ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #06050f; display: flex; align-items: center; justify-content: center; overflow: hidden; }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseBar {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 12px var(--glow, #8A2BE280), inset 0 0 10px var(--glow-in, #8A2BE220); }
    50% { box-shadow: 0 0 22px var(--glow, #8A2BE2bb), inset 0 0 18px var(--glow-in, #8A2BE240); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes scanLine {
    0% { transform: translateY(-100%); opacity: 0; }
    10% { opacity: 0.2; }
    90% { opacity: 0.2; }
    100% { transform: translateY(400%); opacity: 0; }
  }
  @keyframes orbFloat {
    0%, 100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-10px); opacity: 0.9; }
  }
  @keyframes nGlow {
    0%, 100% { box-shadow: 0 0 10px #8A2BE260, 0 0 20px #8A2BE230; }
    50% { box-shadow: 0 0 20px #8A2BE2aa, 0 0 36px #8A2BE260; }
  }
  @keyframes menuPress {
    0% { transform: scale(1); }
    50% { transform: scale(0.97); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>
<div id="root"></div>
<canvas id="bgCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

<script type="text/babel" src="ios-frame.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── BACKGROUND CANVAS ──────────────────────────────────────────────────────
function initBg() {
  const canvas = document.getElementById("bgCanvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const color = "#8A2BE2";
  const particles = Array.from({ length: 55 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2.5 + 0.5,
    vx: (Math.random() - 0.5) * 0.2,
    vy: -(Math.random() * 0.4 + 0.1),
    life: Math.random(), speed: Math.random() * 0.003 + 0.001,
  }));
  const bokeh = Array.from({ length: 12 }, () => ({
    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
    r: Math.random() * 70 + 25, alpha: Math.random() * 0.07 + 0.02,
    vx: (Math.random() - 0.5) * 0.06, vy: (Math.random() - 0.5) * 0.06,
  }));
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const grad = ctx.createRadialGradient(canvas.width*.5, canvas.height*.35, 0, canvas.width*.5, canvas.height*.35, canvas.height*.8);
    grad.addColorStop(0, "#110826"); grad.addColorStop(0.6, "#09041a"); grad.addColorStop(1, "#03020a");
    ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
    bokeh.forEach(b => {
      b.x += b.vx; b.y += b.vy;
      if (b.x < -b.r) b.x = canvas.width + b.r; if (b.x > canvas.width + b.r) b.x = -b.r;
      if (b.y < -b.r) b.y = canvas.height + b.r; if (b.y > canvas.height + b.r) b.y = -b.r;
      const bg = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      bg.addColorStop(0, color + "35"); bg.addColorStop(1, "transparent");
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
      ctx.fillStyle = bg; ctx.globalAlpha = b.alpha; ctx.fill(); ctx.globalAlpha = 1;
    });
    particles.forEach(p => {
      p.life += p.speed; if (p.life > 1) { p.life = 0; p.x = Math.random()*canvas.width; p.y = canvas.height+5; }
      p.x += p.vx; p.y += p.vy;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = color; ctx.globalAlpha = p.life < 0.1 ? p.life*8 : p.life > 0.9 ? (1-p.life)*8 : 0.5;
      ctx.fill(); ctx.globalAlpha = 1;
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ── EXP BAR ──────────────────────────────────────────────────────────────────
function ExpBar({ label, fill, remaining, color }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{
        fontFamily: "'Inter', sans-serif", fontSize: 10, fontWeight: 600,
        color: color, letterSpacing: "0.05em", width: 72, flexShrink: 0,
      }}>{label}</div>
      <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 4 }}>
        <div style={{ color: color + "70", fontSize: 9, fontFamily: "'Inter', sans-serif" }}>[</div>
        <div style={{
          flex: 1, height: 8, background: "rgba(255,255,255,0.07)",
          borderRadius: 2, overflow: "hidden", position: "relative",
        }}>
          <div style={{
            width: `${fill}%`, height: "100%",
            background: `linear-gradient(90deg, ${color}bb, ${color})`,
            borderRadius: 2,
            animation: "pulseBar 2s ease-in-out infinite",
          }}/>
        </div>
        <div style={{ color: color + "70", fontSize: 9, fontFamily: "'Inter', sans-serif" }}>]</div>
      </div>
      <div style={{
        fontFamily: "'Inter', sans-serif", fontSize: 9, color: "#6b5f7a",
        whiteSpace: "nowrap", flexShrink: 0,
      }}>あと {remaining.toLocaleString()}</div>
    </div>
  );
}

// ── MENU ITEM ─────────────────────────────────────────────────────────────────
function MenuItem({ icon, label, sublabel, color, bg, href, delay }) {
  const [pressed, setPressed] = useState(false);
  function handleClick() {
    setPressed(true);
    setTimeout(() => {
      if (href) window.location.href = href;
      setPressed(false);
    }, 180);
  }
  return (
    <div onClick={handleClick} style={{
      display: "flex", alignItems: "center", gap: 14,
      padding: "16px 16px",
      background: pressed
        ? bg.replace(/[\d.]+\)$/, "0.2)")
        : bg,
      border: `1px solid ${color}45`,
      borderRadius: "16px",
      cursor: "pointer",
      animation: `fadeSlideUp 0.5s ease-out ${delay}s both`,
      boxShadow: `0 2px 20px ${color}18, inset 0 1px 0 rgba(255,255,255,0.06)`,
      transform: pressed ? "scale(0.97)" : "scale(1)",
      transition: "transform 0.15s ease, background 0.15s ease",
      position: "relative", overflow: "hidden",
    }}>
      {/* Shimmer */}
      <div style={{
        position: "absolute", inset: 0, borderRadius: "16px",
        background: `linear-gradient(90deg, transparent, ${color}0f, transparent)`,
        backgroundSize: "200% 100%",
        animation: "shimmer 3s infinite",
        pointerEvents: "none",
      }}/>
      {/* Icon */}
      <div style={{
        width: 48, height: 48, borderRadius: "14px", flexShrink: 0,
        background: "rgba(0,0,0,0.5)",
        border: `1px solid ${color}40`,
        display: "flex", alignItems: "center", justifyContent: "center",
        boxShadow: `0 0 12px ${color}30`,
        fontSize: 22,
      }}>{icon}</div>
      {/* Text */}
      <div style={{ flex: 1 }}>
        <div style={{
          fontFamily: "'Cinzel', serif", fontSize: 16, fontWeight: 700,
          color: "#f0ebff", letterSpacing: "0.02em",
        }}>{label}</div>
        <div style={{
          fontFamily: "'Inter', sans-serif", fontSize: 9, fontWeight: 600,
          color: color + "90", letterSpacing: "0.15em", marginTop: 3,
          textTransform: "uppercase",
        }}>{sublabel}</div>
      </div>
      {/* Arrow */}
      <div style={{
        width: 28, height: 28, borderRadius: "50%", flexShrink: 0,
        background: `${color}18`, border: `1px solid ${color}40`,
        display: "flex", alignItems: "center", justifyContent: "center",
        color: color, fontSize: 11, fontWeight: 700,
      }}>›</div>
    </div>
  );
}

// ── MAIN ─────────────────────────────────────────────────────────────────────

        }}>
          <div style={{ fontSize: 12 }}>⚡</div>

            fontFamily: "'Cinzel', serif", fontSize: 10, fontWeight: 600,

}
