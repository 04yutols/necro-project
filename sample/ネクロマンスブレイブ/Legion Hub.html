// ── PARTICLE CANVAS ─────────────────────────────────────────────────────────
function initParticles(color) {
  const canvas = document.getElementById("bgCanvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const c = color || "#8A2BE2";
  const particles = Array.from({ length: 80 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 3 + 0.5,
    vx: (Math.random() - 0.5) * 0.3,
    vy: -(Math.random() * 0.5 + 0.1),
    alpha: Math.random() * 0.6 + 0.1,
    life: Math.random(),
    speed: Math.random() * 0.004 + 0.001,
  }));

  const bokeh = Array.from({ length: 18 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 60 + 20,
    alpha: Math.random() * 0.08 + 0.02,
    vx: (Math.random() - 0.5) * 0.08,
    vy: (Math.random() - 0.5) * 0.08,
  }));

  let af;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Background gradient
    const grad = ctx.createRadialGradient(
      canvas.width * 0.5, canvas.height * 0.4, 0,
      canvas.width * 0.5, canvas.height * 0.4, canvas.height * 0.7
    );
    grad.addColorStop(0, "#12082a");
    grad.addColorStop(0.5, "#0a0515");
    grad.addColorStop(1, "#03020a");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Bokeh
    bokeh.forEach(b => {
      b.x += b.vx; b.y += b.vy;
      if (b.x < -b.r) b.x = canvas.width + b.r;
      if (b.x > canvas.width + b.r) b.x = -b.r;
      if (b.y < -b.r) b.y = canvas.height + b.r;
      if (b.y > canvas.height + b.r) b.y = -b.r;
      const bg = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      bg.addColorStop(0, c + "40");
      bg.addColorStop(1, "transparent");
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = bg;
      ctx.globalAlpha = b.alpha;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Particles
    particles.forEach(p => {
      p.life += p.speed;
      if (p.life > 1) { p.life = 0; p.x = Math.random() * canvas.width; p.y = canvas.height + 10; p.alpha = Math.random() * 0.6 + 0.1; }
      p.x += p.vx;
      p.y += p.vy;
      const a = p.alpha * Math.sin(p.life * Math.PI);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = c;
      ctx.globalAlpha = a;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    af = requestAnimationFrame(draw);
  }
  if (window._bgAF) cancelAnimationFrame(window._bgAF);
  draw();
  window._bgAF = af;
}

// ── HEX SLOT COMPONENT ───────────────────────────────────────────────────────
function HexSlot({ slot, selected, onSelect, color, delay = 0, isVoid = false }) {
  const isSelected = selected === slot.id;
  const style = {
    animation: `slotReveal 0.4s ease-out ${delay}s both`,
  };
  return (
    <div onClick={() => onSelect(slot.id === selected ? null : slot.id)} style={{
      ...style,
      cursor: "pointer",
      display: "flex",
      alignItems: "center",
      gap: "8px",
      padding: "8px 10px",
      background: isSelected
        ? `linear-gradient(135deg, ${color}25, ${color}15)`
        : slot.filled
        ? "linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02))"
        : "linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01))",
      border: `1px solid ${isSelected ? color : slot.filled ? color + "55" : color + "30"}`,
      borderRadius: "10px",
      boxShadow: isSelected
        ? `0 0 16px ${color}60, inset 0 0 10px ${color}20`
        : slot.filled
        ? `0 0 8px ${color}30`
        : "none",
      transition: "all 0.25s ease",
      backdropFilter: "blur(8px)",
      position: "relative",
      overflow: "hidden",
    }}>
      {/* Shimmer overlay */}
      {isSelected && <div style={{
        position: "absolute", inset: 0,
        background: `linear-gradient(90deg, transparent, ${color}20, transparent)`,
        backgroundSize: "200% 100%",
        animation: "shimmer 1.5s infinite",
        pointerEvents: "none",
      }}/>}
      {/* Icon box */}
      <div style={{
        width: 34, height: 34, flexShrink: 0,
        display: "flex", alignItems: "center", justifyContent: "center",
        background: slot.filled ? `${color}18` : "rgba(255,255,255,0.04)",
        border: `1px solid ${slot.filled ? color + "60" : color + "20"}`,
        borderRadius: "8px",
        fontSize: 16,
        position: "relative",
      }}>
        {slot.filled ? slot.icon : <span style={{ color: color + "50", fontSize: 14 }}>＋</span>}
        {slot.filled && isVoid && <div style={{
          position: "absolute", inset: 0, borderRadius: "8px",
          background: `radial-gradient(circle, ${color}30, transparent)`,
          animation: "voidPulse 2s ease-in-out infinite",
        }}/>}
      </div>
      {/* Label */}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontFamily: "'Cinzel', serif", fontSize: 10, fontWeight: 600,
          color: slot.filled ? "#e2d8f0" : "#6b5f7a",
          letterSpacing: "0.08em",
          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
        }}>{slot.label}</div>
        <div style={{
          fontFamily: "'Inter', sans-serif", fontSize: 9, fontWeight: 400,
          color: slot.filled ? "#9b7fc0" : "#4a3a5a",
          marginTop: 1,
        }}>{slot.sublabel}</div>
      </div>
      {/* Level badge */}
      {slot.filled && slot.level && (
        <div style={{
          fontFamily: "'Inter', sans-serif", fontSize: 9, fontWeight: 600,
          color: color, background: `${color}18`,
          padding: "2px 5px", borderRadius: "4px",
          border: `1px solid ${color}40`,
          flexShrink: 0,
        }}>Lv.{slot.level}</div>
      )}
      {isVoid && !slot.filled && (
        <div style={{
          width: 22, height: 22, flexShrink: 0,
          borderRadius: "50%", border: `1px dashed ${color}40`,
          display: "flex", alignItems: "center", justifyContent: "center",
        }}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: `${color}30` }}/>
        </div>
      )}
    </div>
  );
}

// ── FLOATING ORBS ─────────────────────────────────────────────────────────────
function FloatingOrbs({ color }) {
  const orbs = [
    { size: 6, top: "20%", left: "8%", delay: "0s", dur: "3.5s" },
    { size: 4, top: "35%", right: "6%", delay: "1.2s", dur: "4s" },
    { size: 8, top: "55%", left: "5%", delay: "0.6s", dur: "5s" },
    { size: 5, top: "70%", right: "8%", delay: "2s", dur: "3s" },
    { size: 3, top: "15%", right: "15%", delay: "1.8s", dur: "4.5s" },
  ];
  return (
    <div style={{ position: "absolute", inset: 0, pointerEvents: "none", overflow: "hidden" }}>
      {orbs.map((o, i) => (
        <div key={i} style={{
          position: "absolute",
          top: o.top, left: o.left, right: o.right,
          width: o.size, height: o.size, borderRadius: "50%",
          background: color,
          boxShadow: `0 0 ${o.size * 3}px ${color}`,
          animation: `orbFloat ${o.dur} ease-in-out infinite`,
          animationDelay: o.delay,
        }}/>
      ))}
    </div>
  );
}

  const [showTweaks, setShowTweaks] = useState(false);
  const [demonizing, setDemonizing] = useState(false);
  const [mounted, setMounted] = useState(false);

  const char = CHARACTERS[activeChar];
  const color = char.color;
  const accent = char.accentColor;

  useEffect(() => {
    setTimeout(() => setMounted(true), 100);
    initParticles(color);
  }, []);

  useEffect(() => { initParticles(color); }, [color]);

  // Tweaks protocol
  useEffect(() => {
    window.addEventListener("message", (e) => {
      if (e.data?.type === "__activate_edit_mode") setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    });
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
  }, []);

  function setTweak(key, val) {
    setTweakState(prev => {
      const next = typeof key === "object" ? { ...prev, ...key } : { ...prev, [key]: val };
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: next }, "*");
      return next;
    });
  }

  function handleDemonize() {
    setDemonizing(true);
    setTimeout(() => setDemonizing(false), 2000);

    setActiveChar(key);
    setSelectedSlot(null);

          position: "absolute", top: 0, left: "20%", right: "20%", height: 1,
          background: `linear-gradient(90deg, transparent, ${color}60, transparent)`,
          borderRadius: "50%",
        }}/>
        <div style={{ display: "flex", alignItems: "center", marginBottom: 10 }}>
          <div style={{
            flex: 1, height: 1,
            background: `linear-gradient(90deg, ${color}30, ${color}10)`,
          }}/>
          <div style={{
            fontFamily: "'Cinzel', serif", fontSize: 9, fontWeight: 600,
            color: color + "90", letterSpacing: "0.2em",
            padding: "0 10px",
          }}>STATUS</div>
          <div style={{
            flex: 1, height: 1,
            background: `linear-gradient(270deg, ${color}30, ${color}10)`,
          }}/>
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          <StatItem label="ATK" labelJa="攻撃力" value={char.atk} color={color} delay={0.45}/>
          <div style={{ width: 1, background: `${color}20`, alignSelf: "stretch" }}/>
          <StatItem label="DEF" labelJa="防御力" value={char.def} color={color} delay={0.5}/>
          <div style={{ width: 1, background: `${color}20`, alignSelf: "stretch" }}/>
          <StatItem label="SPD" labelJa="速度" value={char.spd} color={color} delay={0.55}/>
          <div style={{ width: 1, background: `${color}20`, alignSelf: "stretch" }}/>
          <StatItem label="HP" labelJa="体力" value={char.hp} color={color} delay={0.6}/>
        </div>
      </div>

      {/* ── BOTTOM NAV ── */}
      <div style={{
        padding: "8px 12px 46px",
        background: "linear-gradient(0deg, rgba(5,2,15,0.98), transparent)",
        zIndex: 2,
        animation: "fadeSlideUp 0.5s ease-out 0.5s both",
      }}>
        {/* Character switcher */}
        <div style={{
          display: "flex", alignItems: "center", gap: 0,
          background: "rgba(255,255,255,0.03)",
          border: `1px solid ${color}20`,
          borderRadius: "16px",
          padding: "10px 14px",
          backdropFilter: "blur(8px)",
        }}>
          <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 18 }}>
            {Object.entries(CHARACTERS).map(([key, c]) => (
              <CharThumb key={key} charKey={key} char={c} active={activeChar === key} onSelect={handleCharSwitch}/>
            ))}
          </div>
          {/* Formation button */}
          <div style={{
            padding: "8px 12px",
            background: `linear-gradient(135deg, ${color}30, ${color}15)`,
            border: `1px solid ${color}60`,
            borderRadius: "10px",
            cursor: "pointer",
            boxShadow: `0 0 12px ${color}30`,
            transition: "all 0.2s ease",
            flexShrink: 0,
          }}>
            <div style={{
              fontFamily: "'Cinzel', serif", fontSize: 8, fontWeight: 700,
              color: color, letterSpacing: "0.05em", textAlign: "center",
            }}>編成</div>
            <div style={{
              fontFamily: "'Inter', sans-serif", fontSize: 7,
              color: accent + "80", textAlign: "center", marginTop: 1,
            }}>Formation</div>
          </div>
        </div>
      </div>

      {/* ── TWEAKS PANEL ── */}
      {showTweaks && (
        <TweaksPanel onClose={() => {
          setShowTweaks(false);
          window.parent.postMessage({ type: "__edit_mode_dismissed" }, "*");
        }}>
          <TweakSection title="Character">
            <TweakRadio id="character" label="Active Unit"
              options={[{value:"skeleton",label:"骸骨"},{value:"zombie",label:"屍兵"},{value:"lich",label:"リッチ"}]}
              value={tweaks.character}
              onChange={v => { setTweak("character", v); setActiveChar(v); }}/>
          </TweakSection>
          <TweakSection title="VFX">
            <TweakRadio id="glow" label="Glow Intensity"
              options={[{value:"low",label:"Low"},{value:"high",label:"High"}]}
              value={tweaks.glowIntensity}
              onChange={v => setTweak("glowIntensity", v)}/>
            <TweakToggle id="runes" label="Show Runes" value={tweaks.showRunes}
              onChange={v => setTweak("showRunes", v)}/>
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
}

// ── RENDER ───────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(
  <IOSDevice dark={true} width={393} height={852}>
    <LegionHub/>
  </IOSDevice>
);
</script>
</body>
</html>
